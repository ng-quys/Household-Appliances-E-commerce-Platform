name: CD - Trigger Render Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

jobs:
  trigger-render:
    name: Trigger Render deploy hook
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered."

      - name: Skip because deploy hook is missing
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: |
          echo "RENDER_DEPLOY_HOOK_URL secret is not configured, so Render deploy was skipped."
