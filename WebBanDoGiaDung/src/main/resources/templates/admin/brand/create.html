<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm thương hiệu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin-cyber.css}">
</head>
<body class="admin-cyber-body">
<div class="admin-dashboard-shell">
    <aside class="admin-sidebar">
        <div>
            <div class="admin-brand">CYBER ADMIN</div>
            <div class="admin-brand-subtitle">Điều khiển hệ thống bán hàng</div>
        </div>
        <nav class="admin-nav">
            <a class="admin-nav-link" th:href="@{/admin/home}">Dashboard</a>
            <a class="admin-nav-link" th:href="@{/admin/products}">Quản lý sản phẩm</a>
            <a class="admin-nav-link active" th:href="@{/admin/brands}">Quản lý thương hiệu</a>
            <a class="admin-nav-link" th:href="@{/admin/accounts}">Quản lý tài khoản</a>
            <a class="admin-nav-link" th:href="@{/admin/orders}">Quản lý đơn hàng</a>
            <a class="admin-nav-link" th:href="@{/}">Về trang chủ</a>
        </nav>
    </aside>

    <main class="admin-dashboard-main">
        <section class="cyber-hero">
            <div>
                <div class="cyber-kicker">ADD BRAND</div>
                <h1 class="cyber-title">Add Brand</h1>
                <p class="cyber-subtitle">Tạo thương hiệu mới với tên và logo tùy chọn, giữ dữ liệu gọn và an toàn cho liên kết sản phẩm.</p>
            </div>
        </section>

        <div th:if="${error}" class="flash-message error" th:text="${error}"></div>

        <section class="cyber-card" style="max-width: 840px;">
            <form th:action="@{/admin/brands/create}" th:object="${brand}" method="post" class="cyber-form-grid">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="cyber-form-field">
                    <label for="brandName">Tên thương hiệu</label>
                    <input id="brandName" class="cyber-input" type="text" th:field="*{brandName}" placeholder="Ví dụ: Philips" required>
                </div>

                <div class="cyber-form-field">
                    <label for="image">Logo URL</label>
                    <input id="image" class="cyber-input" type="text" th:field="*{image}" placeholder="https://...">
                </div>

                <div class="cyber-form-field" style="grid-column: 1 / -1;">
                    <label>Preview</label>
                    <div class="cyber-image-preview">
                        <img id="brandImagePreview" th:src="*{image}" alt="Brand preview" style="max-width:160px;max-height:160px;border-radius:18px;display:none;">
                        <div id="brandImageFallback" class="helper-text">Chưa có logo để xem trước.</div>
                    </div>
                </div>

                <div class="cyber-actions" style="grid-column: 1 / -1; justify-content: flex-end;">
                    <a class="cyber-button-secondary" th:href="@{/admin/brands}">Quay lại</a>
                    <button class="cyber-button-primary" type="submit">Lưu thương hiệu</button>
                </div>
            </form>
        </section>
    </main>
</div>

<script>
    const imageInput = document.getElementById('image');
    const previewImage = document.getElementById('brandImagePreview');
    const fallbackText = document.getElementById('brandImageFallback');

    function updatePreview() {
        const value = imageInput.value.trim();
        if (value) {
            previewImage.src = value;
            previewImage.style.display = 'block';
            fallbackText.style.display = 'none';
        } else {
            previewImage.style.display = 'none';
            fallbackText.style.display = 'block';
        }
    }

    if (imageInput) {
        imageInput.addEventListener('input', updatePreview);
        updatePreview();
    }
</script>
</body>
</html>
