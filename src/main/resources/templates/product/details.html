<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Điện Máy Gia Dụng'">Chi tiết sản phẩm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/home.css}">

</head>
<body class="home-page product-detail-page">

<header class="top-header">
    <div class="container py-3">
        <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-3 justify-content-between">
            <div>
                <a class="brand-text text-decoration-none" th:href="@{/}">Điện Máy Gia Dụng</a>
                <div class="brand-subtitle">Mua sắm tiện nghi, giá tốt mỗi ngày</div>
            </div>

            <form class="search-bar" th:action="@{/products/search}" method="get">
                <input type="text" name="keyword" class="form-control" placeholder="Tìm nồi cơm điện, máy giặt, tủ lạnh...">
                <button type="submit" class="btn btn-warning fw-semibold">Tìm kiếm</button>
            </form>

            <div class="header-actions">
                <a class="header-link" th:href="@{/products}">Sản phẩm</a>
                <a class="header-link" th:href="@{/cart}">Giỏ hàng
                    <span th:if="${cartCount != null && cartCount > 0}" th:text="'(' + ${cartCount} + ')'"></span>
                </a>

                <!-- Admin -->
                <a class="header-link admin-link" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">
                    <i class="bi bi-gear"></i> Admin
                </a>

                <!-- Chưa đăng nhập -->
                <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                    <a class="btn btn-outline-light" th:href="@{/login}">Đăng nhập</a>
                    <a class="btn btn-light text-primary fw-semibold" th:href="@{/register}">Đăng ký</a>
                </div>

                <!-- Đã đăng nhập -->
                <a sec:authorize="isAuthenticated()" class="profile-chip" th:href="@{/profile}">
                    <span class="profile-chip-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" stroke="currentColor" stroke-width="1.8"/>
                            <path d="M4 21C4 17.6863 7.58172 15 12 15C16.4183 15 20 17.6863 20 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <!-- ✅ ĐÃ SỬA PHẦN NÀY -->
                    <span class="profile-chip-name"
                          th:text="${currentUser != null && currentUser.name != null && !#strings.isEmpty(#strings.trim(currentUser.name)) ? #strings.trim(currentUser.name) : (currentUser != null && currentUser.email != null && !#strings.isEmpty(#strings.trim(currentUser.email)) ? #strings.trim(currentUser.email) : #authentication.name)}">
    Người dùng
</span>
                </a>
            </div>
        </div>
    </div>
</header>

<div class="container py-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products}">Sản phẩm</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}"></li>
        </ol>
    </nav>

    <div class="row g-5">
        <!-- Hình ảnh -->
        <div class="col-lg-6">
            <img th:src="${product.image != null && !#strings.isEmpty(product.image) ? product.image : 'https://via.placeholder.com/600x500?text=San+Pham'}"
                 class="product-image-main img-fluid w-100" alt="Ảnh sản phẩm">
        </div>

        <!-- Thông tin sản phẩm -->
        <div class="col-lg-6">
            <h1 class="fw-bold mb-3" th:text="${product.name}"></h1>

            <div class="d-flex align-items-center gap-3 mb-4">
                <span class="price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                <span class="badge bg-success badge-stock" th:if="${product.status == '1'}">Còn hàng</span>
                <span class="badge bg-danger badge-stock" th:unless="${product.status == '1'}">Hết hàng</span>
            </div>

            <p class="lead mb-4" th:text="${product.description} ?: 'Chưa có mô tả chi tiết cho sản phẩm này.'"></p>

            <div class="d-flex gap-3 mb-4">
                <form th:action="@{/cart/add-ajax}" method="post" class="d-inline ajax-add-to-cart-form">
                    <input type="hidden" name="productId" th:value="${product.id}">
                    <button type="submit" class="btn btn-warning fw-semibold">
                        Thêm vào giỏ
                    </button>
                </form>

                <a th:href="@{/products}" class="btn btn-outline-secondary btn-lg px-4">
                    ← Quay lại
                </a>
            </div>

            <!-- Thông tin bổ sung -->
            <div class="row g-3 text-muted small">
                <div class="col-6">
                    <strong>Mã sản phẩm:</strong> <span th:text="${product.id}"></span>
                </div>
                <div class="col-6">
                    <strong>Bảo hành:</strong> 24 tháng
                </div>
                <div class="col-6">
                    <strong>Vận chuyển:</strong> Miễn phí nội thành
                </div>
                <div class="col-6">
                    <strong>Trạng thái:</strong>
                    <span th:text="${product.status == '1' ? 'Đang kinh doanh' : 'Tạm ngưng'}"></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/cart-ajax.js}"></script>
</body>
</html>
