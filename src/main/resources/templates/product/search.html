<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả tìm kiếm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body class="home-page">

<header class="top-header">
    <!-- Giữ nguyên header của bạn -->
    <div class="container py-3">
        <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-3 justify-content-between">
            <div>
                <a class="brand-text text-decoration-none" th:href="@{/}">Điện Máy Gia Dụng</a>
                <div class="brand-subtitle">Mua sắm tiện nghi, giá tốt mỗi ngày</div>
            </div>

            <form class="search-bar" th:action="@{/products}" method="get">
                <input type="text" name="keyword" class="form-control" th:value="${keyword}"
                       placeholder="Tìm nồi cơm điện, máy giặt, tủ lạnh...">
                <button type="submit" class="btn btn-warning fw-semibold">Tìm kiếm</button>
            </form>

            <div class="header-actions">
                <a class="header-link" th:href="@{/products}">Sản phẩm</a>
                <a class="header-link" th:href="@{/cart}">
                    Giỏ hàng
                    <span id="cartCountBadge"
                          th:classappend="${cartCount == null || cartCount <= 0} ? ' d-none' : ''"
                          th:text="' (' + ${cartCount != null ? cartCount : 0} + ')'">
                    (0)
                    </span>
                </a>

                <a class="header-link admin-link" sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Quản trị</a>

                <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                    <a class="btn btn-outline-light" th:href="@{/login}">Đăng nhập</a>
                    <a class="btn btn-light text-primary fw-semibold" th:href="@{/register}">Đăng ký</a>
                </div>

                <a sec:authorize="isAuthenticated()" class="profile-chip" th:href="@{/profile}">
                    <!-- profile chip giữ nguyên -->
                </a>
            </div>
        </div>
    </div>
</header>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="fw-bold mb-1">Kết quả tìm kiếm</h1>
            <p class="text-secondary mb-0">
                Từ khóa: <strong th:text="${keyword != null && !#strings.isEmpty(keyword) ? keyword : 'Tất cả sản phẩm'}"></strong>
            </p>
        </div>
        <a class="btn btn-outline-primary" th:href="@{/products}">Xem tất cả sản phẩm</a>
    </div>

    <!-- ==================== BỘ LỌC ==================== -->
    <form class="row g-3 mb-4 align-items-end" th:action="@{/products}" method="get">
        <div class="col-lg-4">
            <input type="text" class="form-control" name="keyword" th:value="${keyword}"
                   placeholder="Tìm kiếm sản phẩm...">
        </div>
        <div class="col-md-3 col-lg-2">
            <input type="number" class="form-control" name="genreId" th:value="${genreId}"
                   placeholder="Genre ID">
        </div>
        <div class="col-md-2">
            <input type="number" class="form-control" name="minPrice" th:value="${minPrice}"
                   placeholder="Giá từ">
        </div>
        <div class="col-md-2">
            <input type="number" class="form-control" name="maxPrice" th:value="${maxPrice}"
                   placeholder="Giá đến">
        </div>
        <div class="col-md-3 col-lg-1 d-grid">
            <button type="submit" class="btn btn-primary">Lọc</button>
        </div>
        <div class="col-md-6 col-lg-3">
            <label for="sort">Sắp xếp</label>
            <select id="sort" name="sort" class="form-select" onchange="this.form.submit()">
                <option value="" th:selected="${sort == null || #strings.isEmpty(sort)}">Mặc định</option>
                <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Giá thấp đến cao</option>
                <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Giá cao đến thấp</option>
                <option value="newest" th:selected="${sort == 'newest'}">Mới nhất</option>
            </select>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-warning rounded-4">
        Không tìm thấy sản phẩm phù hợp.
    </div>

    <div class="row g-4" th:unless="${#lists.isEmpty(products)}">
        <div class="col-sm-6 col-lg-3" th:each="product : ${products}">
            <div class="product-card h-100">
                <a th:href="@{/products/{id}(id=${product.id})}" class="product-image-link">
                    <img th:src="${product.image}" class="product-image" alt="Ảnh sản phẩm">
                </a>
                <div class="product-body">
                    <a th:href="@{/products/{id}(id=${product.id})}" class="product-name-link">
                        <h3 class="product-name" th:text="${product.productName}">
                            Tên sản phẩm
                        </h3>
                    </a>
                    <div class="price-row">
                        <span class="product-price"
                              th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                            0 đ
                        </span>
                    </div>
                    <div class="product-actions">
                        <a class="btn btn-primary btn-sm" th:href="@{/products/{id}(id=${product.id})}">Xem chi tiết</a>
                        <form th:action="@{/cart/add}" method="post" class="d-inline">
                            <input type="hidden" name="productId" th:value="${product.id}">
                            <input type="hidden" name="redirect" value="/products">
                            <button type="submit" class="btn btn-warning btn-sm fw-semibold">Thêm vào giỏ</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== PHÂN TRANG AN TOÀN ==================== -->
    <div th:if="${productPage != null && productPage.totalPages > 1}" class="d-flex justify-content-center mt-5">
        <nav>
            <ul class="pagination">
                <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/products(keyword=${keyword}, genreId=${genreId}, brandId=${brandId},
                                  minPrice=${minPrice}, maxPrice=${maxPrice},
                                  page=${productPage.number - 1}, size=${productPage.size}, sort=${sort})}">
                        « Trước
                    </a>
                </li>

                <li class="page-item" th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                    th:classappend="${i == productPage.number} ? 'active'">
                    <a class="page-link"
                       th:href="@{/products(keyword=${keyword}, genreId=${genreId}, brandId=${brandId},
                                  minPrice=${minPrice}, maxPrice=${maxPrice},
                                  page=${i}, size=${productPage.size}, sort=${sort})}"
                       th:text="${i + 1}"></a>
                </li>

                <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/products(keyword=${keyword}, genreId=${genreId}, brandId=${brandId},
                                  minPrice=${minPrice}, maxPrice=${maxPrice},
                                  page=${productPage.number + 1}, size=${productPage.size}, sort=${sort})}">
                        Sau »
                    </a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="text-center text-secondary mt-3" th:if="${productPage != null}">
        Trang <strong th:text="${productPage.number + 1}"></strong> /
        <strong th:text="${productPage.totalPages}"></strong>
        — Tổng <strong th:text="${productPage.totalElements}"></strong> sản phẩm
    </div>
</div>
<script th:src="@{/js/cart-ajax.js}"></script>
</body>
</html>
