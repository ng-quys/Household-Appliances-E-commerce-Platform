<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container reset-password-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Reset Password</h2>
            <p>Enter a new password for your account.</p>
        </div>

        <div th:if="${error}" class="alert-message error-alert" th:text="${error}">
            Something went wrong.
        </div>

        <form th:action="@{/reset-password}" method="post" class="login-form">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div class="input-wrapper">
                    <input
                            id="email"
                            type="email"
                            th:value="${email}"
                            readonly>
                    <span class="focus-border"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <div class="input-wrapper password-wrapper">
                    <input
                            id="password"
                            name="password"
                            type="password"
                            minlength="6"
                            placeholder="At least 6 characters"
                            required>
                    <button
                            type="button"
                            class="password-toggle"
                            data-password-toggle="password"
                            aria-label="Toggle password visibility">
                        <span class="eye-icon"></span>
                    </button>
                    <span class="focus-border"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm New Password</label>
                <div class="input-wrapper password-wrapper">
                    <input
                            id="confirmPassword"
                            name="confirmPassword"
                            type="password"
                            minlength="6"
                            placeholder="Confirm your new password"
                            required>
                    <button
                            type="button"
                            class="password-toggle"
                            data-password-toggle="confirmPassword"
                            aria-label="Toggle confirm password visibility">
                        <span class="eye-icon"></span>
                    </button>
                    <span class="focus-border"></span>
                </div>
            </div>

            <button type="submit" class="login-btn btn">
                <span class="btn-text">Update Password</span>
                <span class="btn-loader"></span>
            </button>
        </form>

        <div class="signup-link back-home-link">
            <p><a th:href="@{/login}">← Back to Sign In</a></p>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('[data-password-toggle]').forEach(function (button) {
        const inputId = button.getAttribute('data-password-toggle');
        const input = document.getElementById(inputId);

        if (!input) {
            return;
        }

        button.addEventListener('click', function () {
            const isPassword = input.getAttribute('type') === 'password';
            input.setAttribute('type', isPassword ? 'text' : 'password');
            button.classList.toggle('is-visible', isPassword);
        });
    });
</script>
</body>
</html>
