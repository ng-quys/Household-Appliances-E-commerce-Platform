<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container register-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Create Account</h2>
            <p>Create a new account to shop, track orders, and manage your profile.</p>
        </div>

        <div th:if="${error}" class="alert-message error-alert" th:text="${error}">
            Something went wrong.
        </div>

        <form th:action="@{/register}" method="post" class="login-form">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <div class="input-wrapper">
                    <input
                            id="name"
                            name="name"
                            type="text"
                            placeholder="Your Name"
                            th:value="${name}"
                            required>
                    <span class="focus-border"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div class="input-wrapper">
                    <input
                            id="email"
                            name="email"
                            type="email"
                            placeholder="you@example.com"
                            th:value="${email}"
                            required>
                    <span class="focus-border"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <div class="input-wrapper">
                    <input
                            id="phone"
                            name="phone"
                            type="text"
                            maxlength="10"
                            placeholder="0123456789"
                            th:value="${phone}"
                            required>
                    <span class="focus-border"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrapper password-wrapper">
                    <input
                            id="password"
                            name="password"
                            type="password"
                            placeholder="Enter your password"
                            required>
                    <button
                            type="button"
                            class="password-toggle"
                            data-password-toggle="password"
                            aria-label="Toggle password visibility">
                        <span class="eye-icon"></span>
                    </button>
                    <span class="focus-border"></span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper password-wrapper">
                    <input
                            id="confirmPassword"
                            name="confirmPassword"
                            type="password"
                            placeholder="Confirm your password"
                            required>
                    <button
                            type="button"
                            class="password-toggle"
                            data-password-toggle="confirmPassword"
                            aria-label="Toggle confirm password visibility">
                        <span class="eye-icon"></span>
                    </button>
                    <span class="focus-border"></span>
                </div>
            </div>

            <button type="submit" class="login-btn btn">
                <span class="btn-text">Create Account</span>
                <span class="btn-loader"></span>
            </button>
        </form>

        <div class="signup-link">
            <p>Already have an account? <a th:href="@{/login}">Sign in</a></p>
        </div>

        <div class="signup-link back-home-link">
            <p><a th:href="@{/}">← Back to home</a></p>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('[data-password-toggle]').forEach(function (button) {
        const inputId = button.getAttribute('data-password-toggle');
        const input = document.getElementById(inputId);

        if (!input) {
            return;
        }

        button.addEventListener('click', function () {
            const isPassword = input.getAttribute('type') === 'password';
            input.setAttribute('type', isPassword ? 'text' : 'password');
            button.classList.toggle('is-visible', isPassword);
        });
    });
</script>
</body>
</html>
