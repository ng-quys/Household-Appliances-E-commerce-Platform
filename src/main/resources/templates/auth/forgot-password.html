<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container forgot-password-container">
    <div class="login-card">
        <div class="login-header">
            <h2>Forgot Password</h2>
            <p>Enter your email address and we’ll send you instructions to reset your password.</p>
        </div>

        <div th:if="${success}" class="alert-message success-alert">
            <div class="success-icon">✓</div>
            <div>
                <h3>Email sent</h3>
                <p th:text="${success}">If the email exists, reset instructions have been sent.</p>
            </div>
        </div>

        <div th:if="${error}" class="alert-message error-alert" th:text="${error}">
            Something went wrong.
        </div>

        <form th:action="@{/forgot-password}" method="post" class="login-form">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <div class="input-wrapper">
                    <input
                            id="email"
                            name="email"
                            type="email"
                            placeholder="you@example.com"
                            required>
                    <span class="focus-border"></span>
                </div>
            </div>

            <button type="submit" class="login-btn btn">
                <span class="btn-text">Send Reset Link</span>
                <span class="btn-loader"></span>
            </button>
        </form>

        <div class="signup-link back-home-link">
            <p><a th:href="@{/login}">← Back to Sign In</a></p>
        </div>
    </div>
</div>
</body>
</html>
