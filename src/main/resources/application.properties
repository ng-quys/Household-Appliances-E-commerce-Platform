ai.provider=${AI_PROVIDER:gemini}
ai.api-key=${AI_API_KEY:}
openai.api.key=${OPENAI_API_KEY:}

ai.openai-model=${AI_OPENAI_MODEL:gpt-4.1-mini}
ai.gemini-model=${AI_GEMINI_MODEL:gemini-2.5-flash}
ai.confidence-threshold=${AI_CONFIDENCE_THRESHOLD:0.7}

# Actuator & Prometheus Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
