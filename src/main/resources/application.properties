spring.application.name=WebBanDoGiaDung

spring.datasource.url=jdbc:mysql://db51000.public.databaseasp.net:3306/db51000
spring.datasource.username=###
spring.datasource.password=###

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000

spring.thymeleaf.cache=false
spring.web.resources.static-locations=classpath:/static/
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

logging.level.org.springframework.cache=DEBUG
logging.level.org.springframework.cache.interceptor=TRACE
spring.session.store-type=redis
spring.session.timeout=30m
spring.session.redis.namespace=web-ban-do-gia-dung:session

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:mango}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:123456}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

momo.endpoint=https://test-payment.momo.vn/v2/gateway/api/create
momo.partner-code=MOMO
momo.access-key=${MOMO_ACCESS_KEY:}
#momo.access-key=dummy;

momo.secret-key=${MOMO_SECRET_KEY:}
#momo.secret-key=dummy;

momo.redirect-url=http://localhost/payment/momo/return
momo.ipn-url=http://localhost/payment/momo/ipn
momo.request-type=captureWallet

gemini.api.key=${GEMINI_API_KEY:}
#gemini.api.key=dummy;

app.jwt.secret=${JWT_SECRET:###}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.base-url=${APP_BASE_URL:http://localhost}

spring.security.oauth2.client.registration.google.client-id=###
spring.security.oauth2.client.registration.google.client-secret=###
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
server.forward-headers-strategy=framework

# Server Configuration
server.port=${PORT:8080}

# AI phan loai anh san pham trong trang admin.
# Dung gemini de tiet kiem chi phi, hoac doi thanh openai neu muon dung OpenAI Vision.
